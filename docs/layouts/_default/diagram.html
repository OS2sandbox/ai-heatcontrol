<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }} — OS2 AI Heat Control</title>
<link rel="stylesheet" href="{{ "style.css" | relURL }}">
  <style>
    /* Align with index.html content-section */
    .content-section.diagram-page {
      padding: 120px 40px;
    }
/* Mermaid diagram - full width edge to edge with white side borders */
    .content-section.diagram-page .mermaid {
      overflow-x: auto;
      padding: 24px 200px;
      margin: 24px -200px;
      background: #fafafa;
      border-radius: 0;
      width: 100vw;
      position: relative;
      left: 50%;
      right: 50%;
      margin-left: -50vw;
      margin-right: -50vw;
      box-shadow: 
        inset 60px 0 0 0 #ffffff,
        inset -60px 0 0 0 #ffffff;
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <a href="{{ "/" | relURL }}" class="logo">
        <img src="{{ "os2-logo.png" | relURL }}" alt="OS2">
      </a>
      <nav>
        <ul>
          <li><a href="/">Home</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="content-section diagram-page">
      <div class="container">
        {{ .Content }}
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>OS2 AI Heat Control</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({ 
      startOnLoad: true, 
      theme: 'default',
      flowchart: { 
        useMaxWidth: true,
        padding: 7,
        nodeSpacing: 30,
        rankSpacing: 30,
        wrappingWidth: 180
      },
      fontSize: 14
    });
  </script>
</body>
</html>
