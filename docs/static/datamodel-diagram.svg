<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Legend -->
  <text x="400" y="25" text-anchor="middle" font-family="'Inter', sans-serif" font-size="11" font-weight="500" fill="#64748b" letter-spacing="0.05em">RELATIONSDIAGRAM</text>

  <g transform="translate(280, 35)">
    <rect x="0" y="0" width="16" height="16" rx="3" fill="#eef2ff" stroke="#88B0D8" stroke-width="1"/>
    <text x="22" y="12" font-family="'Inter', sans-serif" font-size="10" fill="#1e293b">RealEstateCore</text>
  </g>
  <g transform="translate(420, 35)">
    <rect x="0" y="0" width="16" height="16" rx="3" fill="#d1fae5" stroke="#6b8a86" stroke-width="1"/>
    <text x="22" y="12" font-family="'Inter', sans-serif" font-size="10" fill="#1e293b">Brick Schema</text>
  </g>
  <g transform="translate(560, 35)">
    <rect x="0" y="0" width="16" height="16" rx="3" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1"/>
    <text x="22" y="12" font-family="'Inter', sans-serif" font-size="10" fill="#1e293b">OS2</text>
  </g>

  <!-- Nodes -->
  <!-- Row 1 -->
  <g transform="translate(150, 80)">
    <rect width="110" height="36" rx="6" fill="#eef2ff" stroke="#88B0D8" stroke-width="1.2"/>
    <text x="55" y="23" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" font-weight="600" fill="#475569">rec:Room</text>
  </g>
  <g transform="translate(380, 80)">
    <rect width="110" height="36" rx="6" fill="#eef2ff" stroke="#88B0D8" stroke-width="1.2"/>
    <text x="55" y="23" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" font-weight="600" fill="#475569">rec:Building</text>
  </g>

  <!-- Row 2 -->
  <g transform="translate(40, 180)">
    <rect width="130" height="36" rx="6" fill="#d1fae5" stroke="#6b8a86" stroke-width="1.2"/>
    <text x="65" y="23" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" font-weight="600" fill="#3d6b62">brick:HVAC_Zone</text>
  </g>
  <g transform="translate(250, 180)">
    <rect width="150" height="36" rx="6" fill="#d1fae5" stroke="#6b8a86" stroke-width="1.2"/>
    <text x="75" y="23" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" font-weight="600" fill="#3d6b62">brick:Temperature_Sensor</text>
  </g>
  <g transform="translate(450, 180)">
    <rect width="110" height="36" rx="6" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.2"/>
    <text x="55" y="23" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" font-weight="600" fill="#4b5563">os2:Schedule</text>
  </g>
  <g transform="translate(620, 180)">
    <rect width="140" height="36" rx="6" fill="#d1fae5" stroke="#6b8a86" stroke-width="1.2"/>
    <text x="70" y="23" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" font-weight="600" fill="#3d6b62">brick:Weather_Station</text>
  </g>

  <!-- Row 3 -->
  <g transform="translate(10, 280)">
    <rect width="100" height="36" rx="6" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.2"/>
    <text x="50" y="23" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" font-weight="600" fill="#4b5563">os2:Setpoint</text>
  </g>
  <g transform="translate(150, 280)">
    <rect width="140" height="36" rx="6" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.2"/>
    <text x="70" y="23" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" font-weight="600" fill="#4b5563">os2:FallbackStrategy</text>
  </g>
  <g transform="translate(340, 280)">
    <rect width="160" height="36" rx="6" fill="#d1fae5" stroke="#6b8a86" stroke-width="1.2"/>
    <text x="80" y="23" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" font-weight="600" fill="#3d6b62">brick:TimeseriesReference</text>
  </g>

  <!-- Edges -->
  <!-- Room -> Building (locatedIn) -->
  <line x1="260" y1="98" x2="380" y2="98" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="290" y="88" width="50" height="20" rx="4" fill="white" stroke="#d1d5db" stroke-width="0.8"/>
  <text x="315" y="102" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#64748b">locatedIn</text>

  <!-- Building -> TempSensor (hasPoint) -->
  <line x1="490" y1="98" x2="600" y2="133" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)" transform="rotate(35 490 98)"/>
  <rect x="520" y="90" width="60" height="20" rx="4" fill="white" stroke="#d1d5db" stroke-width="0.8"/>
  <text x="550" y="104" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#64748b">hasPoint</text>

  <!-- TempSensor -> Room (isPointOf) -->
  <line x1="325" y1="216" x2="325" y2="198" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="325" y1="198" x2="260" y2="116" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="265" y="195" width="55" height="20" rx="4" fill="white" stroke="#d1d5db" stroke-width="0.8"/>
  <text x="292" y="209" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#64748b">isPointOf</text>

  <!-- WeatherStation -> Building (monitors) -->
  <line x1="690" y1="198" x2="690" y2="116" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="650" y="145" width="60" height="20" rx="4" fill="white" stroke="#d1d5db" stroke-width="0.8"/>
  <text x="680" y="159" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#64748b">monitors</text>

  <!-- Schedule -> Building (servesBuilding) -->
  <line x1="560" y1="198" x2="560" y2="116" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="512" y="145" width="80" height="20" rx="4" fill="white" stroke="#d1d5db" stroke-width="0.8"/>
  <text x="552" y="159" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#64748b">servesBuilding</text>

  <!-- HVAC -> Room (feeds) -->
  <line x1="105" y1="216" x2="105" y2="180" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 2"/>
  <line x1="105" y1="180" x2="205" y2="133" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="65" y="165" width="35" height="20" rx="4" fill="white" stroke="#d1d5db" stroke-width="0.8"/>
  <text x="82" y="179" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#64748b">feeds</text>

  <!-- Setpoint -> HVAC (controls) -->
  <line x1="60" y1="298" x2="60" y2="280" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="60" y1="280" x2="170" y2="216" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="12" y="275" width="45" height="20" rx="4" fill="white" stroke="#d1d5db" stroke-width="0.8"/>
  <text x="34" y="289" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#64748b">controls</text>

  <!-- Fallback -> HVAC (controls) -->
  <line x1="220" y1="298" x2="220" y2="280" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="220" y1="280" x2="105" y2="216" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="160" y="278" width="55" height="20" rx="4" fill="white" stroke="#d1d5db" stroke-width="0.8"/>
  <text x="187" y="292" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#64748b">controls</text>

  <!-- Footer link -->
  <text x="400" y="435" text-anchor="middle" font-family="'Inter', sans-serif" font-size="10" fill="#64748b">
    <tspan text-decoration="underline" text-underline-offset="3">Brick + REC integration</tspan>
  </text>
</svg>